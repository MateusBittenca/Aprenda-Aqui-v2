<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;800;900&amp;family=Plus+Jakarta+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .block-shadow-primary {
            box-shadow: 0 4px 0 #1f5100;
        }
        .block-shadow-primary:active {
            box-shadow: 0 0px 0 #1f5100;
            transform: translateY(4px);
        }
        .block-shadow-card {
            box-shadow: 0 4px 0 #e3e2e1;
        }
        .block-shadow-card-selected {
            box-shadow: 0 4px 0 #c6c8fd;
        }
        .block-shadow-card:active {
            box-shadow: 0 0px 0 #e3e2e1;
            transform: translateY(4px);
        }
        .progress-glow {
            background: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%);
        }
        .bouncy-transition {
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error-container": "#ffdad6",
                      "on-tertiary-fixed-variant": "#594400",
                      "surface-container-low": "#f4f3f2",
                      "on-secondary-fixed": "#141742",
                      "surface-tint": "#2b6c00",
                      "surface-dim": "#dadad9",
                      "background": "#faf9f8",
                      "error": "#ba1a1a",
                      "tertiary-fixed": "#ffdf92",
                      "on-background": "#1a1c1b",
                      "on-error": "#ffffff",
                      "on-primary-fixed": "#082100",
                      "surface-container-highest": "#e3e2e1",
                      "outline-variant": "#becbb1",
                      "on-secondary-fixed-variant": "#404370",
                      "primary-container": "#58cc02",
                      "on-tertiary-container": "#574300",
                      "on-tertiary": "#ffffff",
                      "on-surface": "#1a1c1b",
                      "inverse-primary": "#6be026",
                      "surface-bright": "#faf9f8",
                      "inverse-on-surface": "#f1f1ef",
                      "secondary-fixed": "#e0e0ff",
                      "on-secondary": "#ffffff",
                      "inverse-surface": "#2f3130",
                      "surface-variant": "#e3e2e1",
                      "on-tertiary-fixed": "#241a00",
                      "secondary": "#575a89",
                      "tertiary-fixed-dim": "#f4bf00",
                      "secondary-container": "#c6c8fd",
                      "surface": "#faf9f8",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed-dim": "#c0c2f7",
                      "outline": "#6f7b64",
                      "on-primary-fixed-variant": "#1f5100",
                      "on-error-container": "#93000a",
                      "on-surface-variant": "#3f4a36",
                      "on-primary": "#ffffff",
                      "tertiary": "#755b00",
                      "surface-container-high": "#e9e8e7",
                      "surface-container": "#eeeeec",
                      "primary": "#2b6c00",
                      "on-secondary-container": "#4f5280",
                      "primary-fixed-dim": "#6be026",
                      "on-primary-container": "#1e5000",
                      "primary-fixed": "#87fe45",
                      "tertiary-container": "#ddad00"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "16px",
                      "base": "8px",
                      "sm": "12px",
                      "xs": "4px",
                      "xl": "64px",
                      "container-max": "1200px",
                      "md": "24px",
                      "lg": "40px"
              },
              "fontFamily": {
                      "label-lg": ["Plus Jakarta Sans"],
                      "headline-md": ["Nunito Sans"],
                      "display-lg": ["Nunito Sans"],
                      "headline-lg-mobile": ["Nunito Sans"],
                      "headline-lg": ["Nunito Sans"],
                      "display-md": ["Nunito Sans"],
                      "body-md": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "900"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "800"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "800"}],
                      "display-md": ["32px", {"lineHeight": "40px", "fontWeight": "800"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-surface font-body-md text-on-surface overflow-x-hidden min-h-screen flex flex-col">
<!-- Top Lesson Header -->
<header class="fixed top-0 left-0 w-full bg-surface z-50 h-xl px-gutter md:px-lg flex items-center justify-center">
<div class="max-w-container-max w-full flex items-center gap-md">
<button class="p-xs hover:bg-surface-variant rounded-lg bouncy-transition">
<span class="material-symbols-outlined text-outline" style="font-size: 32px;">close</span>
</button>
<div class="flex-grow h-base bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="h-full w-[45%] bg-primary-container relative bouncy-transition" id="progressFill">
<div class="absolute top-0 left-0 w-full h-1/2 progress-glow"></div>
</div>
</div>
<div class="flex items-center gap-xs font-headline-md text-error px-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-black">5</span>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-xl pb-xl flex flex-col items-center px-gutter">
<div class="w-full max-w-4xl mt-lg flex flex-col gap-lg">
<!-- Question Section -->
<div class="flex flex-col gap-md">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-on-surface leading-tight">
                    Qual tag HTML é usada para criar o título principal de uma página?
                </h2>
<div class="relative w-48 md:w-56 aspect-square self-center md:self-start mt-base">
<img alt="Mascot thinking" class="w-full h-full object-contain drop-shadow-xl" data-alt="A friendly and cute 3D animated robot mascot character pointing to its head in a thinking gesture. The mascot has a vibrant green body and friendly digital eyes. It is set against a clean, minimalist white background with soft, high-key studio lighting that emphasizes its rounded, tactile textures and glossy finish. The style is modern, approachable, and gamified." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiDwDe3Ulhok2jmidnFXCUpqkHCyVBqIc29SVuWm7aT0FTduz3Vc85fWJ2FPSeGLkHr7042kg0pgr98KLyB5TXDimWc2-PgL9yOLKs7Q_tf8_a2bCNLK5gnwbMOA4vQkyZMYFkTUfcbEJIL5_H5Y1zEOSp7N_f5si_tCnQpqfL_tTPMTXTv8pgTxEH_McwT3QvNGOpL3duxGVq9MVYuhcyRxFECsh-Wzsb1s4RPiFF5Ax1o8vxWRjwS3YUDvv7fpVqAfrsn4YAznA"/>
</div>
</div>
<!-- Choice Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md" id="choiceGrid">
<!-- Option A -->
<button class="choice-card group flex items-center gap-md p-md bg-surface border-2 border-surface-container-highest rounded-lg block-shadow-card bouncy-transition text-left hover:bg-surface-container-low" onclick="selectOption(this)">
<span class="w-10 h-10 flex items-center justify-center border-2 border-surface-container-highest rounded-md font-bold group-aria-selected:border-secondary-container group-aria-selected:bg-secondary-container/20">A</span>
<span class="font-headline-md text-on-surface-variant">&lt;p&gt;</span>
</button>
<!-- Option B -->
<button class="choice-card group flex items-center gap-md p-md bg-surface border-2 border-surface-container-highest rounded-lg block-shadow-card bouncy-transition text-left hover:bg-surface-container-low" onclick="selectOption(this)">
<span class="w-10 h-10 flex items-center justify-center border-2 border-surface-container-highest rounded-md font-bold group-aria-selected:border-secondary-container group-aria-selected:bg-secondary-container/20">B</span>
<span class="font-headline-md text-on-surface-variant">&lt;h1&gt;</span>
</button>
<!-- Option C -->
<button class="choice-card group flex items-center gap-md p-md bg-surface border-2 border-surface-container-highest rounded-lg block-shadow-card bouncy-transition text-left hover:bg-surface-container-low" onclick="selectOption(this)">
<span class="w-10 h-10 flex items-center justify-center border-2 border-surface-container-highest rounded-md font-bold group-aria-selected:border-secondary-container group-aria-selected:bg-secondary-container/20">C</span>
<span class="font-headline-md text-on-surface-variant">&lt;div&gt;</span>
</button>
<!-- Option D -->
<button class="choice-card group flex items-center gap-md p-md bg-surface border-2 border-surface-container-highest rounded-lg block-shadow-card bouncy-transition text-left hover:bg-surface-container-low" onclick="selectOption(this)">
<span class="w-10 h-10 flex items-center justify-center border-2 border-surface-container-highest rounded-md font-bold group-aria-selected:border-secondary-container group-aria-selected:bg-secondary-container/20">D</span>
<span class="font-headline-md text-on-surface-variant">&lt;a&gt;</span>
</button>
</div>
</div>
</main>
<!-- Bottom Bar -->
<footer class="sticky bottom-0 w-full bg-surface-container-lowest border-t-2 border-surface-container-highest py-md md:py-lg px-gutter z-50">
<div class="max-w-container-max mx-auto flex flex-col md:flex-row items-center justify-between gap-md">
<div class="hidden md:flex flex-col opacity-0 transition-opacity duration-300" id="feedbackText">
<span class="font-headline-md text-primary" id="feedbackTitle">Muito bem!</span>
<span class="font-body-md text-on-surface-variant">Continue assim e você vai dominar o HTML.</span>
</div>
<button class="w-full md:w-64 h-xl bg-surface-container-highest text-on-surface/30 font-headline-md rounded-lg block-shadow-card transition-all duration-200 cursor-not-allowed" disabled="" id="checkButton" onclick="checkAnswer()">
                VERIFICAR
            </button>
</div>
</footer>
<script>
        function selectOption(el) {
            // Remove selection from others
            document.querySelectorAll('.choice-card').forEach(card => {
                card.classList.remove('border-secondary', 'bg-secondary-container/10', 'block-shadow-card-selected');
                card.classList.add('border-surface-container-highest', 'block-shadow-card');
                card.setAttribute('aria-selected', 'false');
            });

            // Add selection to clicked
            el.classList.remove('border-surface-container-highest', 'block-shadow-card');
            el.classList.add('border-secondary', 'bg-secondary-container/10', 'block-shadow-card-selected');
            el.setAttribute('aria-selected', 'true');

            // Enable check button
            const btn = document.getElementById('checkButton');
            btn.disabled = false;
            btn.classList.remove('bg-surface-container-highest', 'text-on-surface/30', 'cursor-not-allowed');
            btn.classList.add('bg-primary-container', 'text-on-primary-container', 'block-shadow-primary');
        }

        function checkAnswer() {
            const selected = document.querySelector('.choice-card[aria-selected="true"]');
            const checkButton = document.getElementById('checkButton');
            const footer = document.querySelector('footer');
            const feedbackText = document.getElementById('feedbackText');
            
            if (!selected) return;

            const isCorrect = selected.innerText.includes('<h1>');
            
            if (isCorrect) {
                // Correct State
                footer.classList.replace('bg-surface-container-lowest', 'bg-primary-container/20');
                checkButton.innerText = "CONTINUAR";
                checkButton.classList.replace('bg-primary-container', 'bg-primary-container');
                feedbackText.classList.remove('hidden');
                setTimeout(() => feedbackText.classList.add('opacity-100'), 10);
                
                // Pulse progress
                const progress = document.getElementById('progressFill');
                progress.style.width = '60%';
            } else {
                // Incorrect State
                footer.classList.replace('bg-surface-container-lowest', 'bg-error-container');
                checkButton.innerText = "OK";
                checkButton.classList.remove('bg-primary-container', 'block-shadow-primary');
                checkButton.classList.add('bg-error', 'text-on-error', 'shadow-[0_4px_0_#93000a]');
                
                document.getElementById('feedbackTitle').innerText = "Opa, quase lá!";
                document.getElementById('feedbackTitle').classList.replace('text-primary', 'text-error');
                feedbackText.classList.remove('hidden');
                setTimeout(() => feedbackText.classList.add('opacity-100'), 10);
            }
        }
    </script>
</body></html>
