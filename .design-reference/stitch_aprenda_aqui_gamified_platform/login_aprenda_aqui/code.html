<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-xs" for="email">Email</label>
<div class="relative">
<input class="w-full px-md py-sm rounded-xl border-2 border-outline-variant focus:border-on-secondary-fixed focus:ring-0 outline-none transition-all font-body-md text-on-surface bg-surface-container-low" id="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Senha</label>

</div>
<div class="relative">
<input class="w-full px-md py-sm rounded-xl border-2 border-outline-variant focus:border-on-secondary-fixed focus:ring-0 outline-none transition-all font-body-md text-on-surface bg-surface-container-low" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="tactile-button w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-sm rounded-full uppercase tracking-wider mt-md" type="submit">

<script>
        // Micro-interaction for input fields focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
